AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC role for bedrock-access-gateway-function-url E2E tests.
  Restricted to repo + actor:gabrielkoo only.

Parameters:
  GitHubOrg:
    Type: String
    Default: gabrielkoo
  RepoName:
    Type: String
    Default: bedrock-access-gateway-function-url
  OIDCProviderArn:
    Type: String
    Default: ''
    Description: >
      ARN of existing GitHub OIDC provider. Leave empty to create one.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${RepoName}-e2e-ci'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${RepoName}:actor:${GitHubOrg}'
      Policies:
        - PolicyName: BedrockE2EAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockList
                Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:ListInferenceProfiles
                Resource: '*'
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - arn:aws:bedrock:*::foundation-model/*
                  - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: Use this as E2E_ROLE_ARN secret in GitHub Actions
