name: CI - Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly check: upstream patches still apply + templates valid
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:

jobs:
  validate-patches:
    name: Validate patches against upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream bedrock-access-gateway
        run: |
          git clone --depth 1 https://github.com/aws-samples/bedrock-access-gateway.git build/bedrock-access-gateway

      - name: Apply required patches
        run: |
          cd build/bedrock-access-gateway/src
          for patch in app.py.patch auth.py.patch requirements.txt.patch; do
            echo "Applying $patch..."
            patch -p1 < "../../../patches/$patch"
          done
          echo "All required patches applied successfully"

  validate-templates:
    name: Validate SAM templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2

      - name: Validate template.yaml
        run: sam validate -t template.yaml --lint

      - name: Validate template-with-secrets-manager.yaml
        run: sam validate -t template-with-secrets-manager.yaml --lint

  build:
    name: SAM Build
    needs: [validate-patches, validate-templates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare source
        run: ./prepare_source.sh

      - name: SAM Build (x86_64, containerized)
        run: |
          sam build --use-container \
            --parameter-overrides "Architecture=x86_64" \
            -t template.yaml

      - name: SAM Build (arm64, native)
        run: |
          sam build \
            --parameter-overrides "Architecture=arm64" \
            -t template.yaml

  e2e:
    name: E2E API Tests
    needs: [build]
    # Skip scheduled runs and fork PRs (no OIDC access)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      API_KEY: test-ci-key
      DEFAULT_MODEL: us.amazon.nova-lite-v1:0
      ENABLE_CROSS_REGION_INFERENCE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.E2E_ROLE_ARN }}
          aws-region: us-west-2

      - name: Prepare source
        run: ./prepare_source.sh

      - name: Install dependencies
        run: pip install -r layer/requirements.txt

      - name: Start server
        run: |
          cd app && PYTHONPATH=. python3 api/app.py > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "FAIL: server crashed on startup:"
              cat /tmp/server.log
              exit 1
            fi
            if curl -sf http://localhost:8000/api/v1/models -H "Authorization: Bearer $API_KEY" > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8000/api/v1/models -H "Authorization: Bearer $API_KEY" > /dev/null 2>&1; then
            echo "FAIL: server not ready after 30s:"
            cat /tmp/server.log
            exit 1
          fi

      - name: Test - List models
        run: |
          RESP=$(curl -sf http://localhost:8000/api/v1/models -H "Authorization: Bearer $API_KEY")
          echo "$RESP" | jq .
          COUNT=$(echo "$RESP" | jq '.data | length')
          [ "$COUNT" -gt 0 ] || (echo "FAIL: no models returned" && exit 1)

      - name: Test - Chat completion
        run: |
          RESP=$(curl -sf http://localhost:8000/api/v1/chat/completions \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"us.amazon.nova-lite-v1:0","messages":[{"role":"user","content":"Say hi in 3 words"}],"max_tokens":10}')
          echo "$RESP" | jq .
          echo "$RESP" | jq -e '.choices[0].message.content' || (echo "FAIL: no chat response" && exit 1)

      - name: Test - Chat completion (streaming)
        run: |
          curl -sf http://localhost:8000/api/v1/chat/completions \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"us.amazon.nova-lite-v1:0","messages":[{"role":"user","content":"Say hi"}],"max_tokens":10,"stream":true}' \
            | grep -q 'data:' || (echo "FAIL: no streaming data" && exit 1)

      - name: Test - Embeddings
        run: |
          RESP=$(curl -sf http://localhost:8000/api/v1/embeddings \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"amazon.titan-embed-text-v2:0","input":"hello world"}')
          echo "$RESP" | jq .
          echo "$RESP" | jq -e '.data[0].embedding | length > 0' || (echo "FAIL: no embeddings" && exit 1)

      - name: Test - Invalid auth rejected
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/v1/models \
            -H "Authorization: Bearer wrong-key")
          [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "401" ] || (echo "FAIL: expected 401/403, got $HTTP_CODE" && exit 1)

  notify-upstream-drift:
    name: Check upstream drift
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream and check for changes
        id: drift
        run: |
          git clone --depth 1 https://github.com/aws-samples/bedrock-access-gateway.git /tmp/upstream

          UPSTREAM_AUTH_HASH=$(sha256sum /tmp/upstream/src/api/auth.py | cut -d' ' -f1)
          UPSTREAM_REQ_HASH=$(sha256sum /tmp/upstream/src/requirements.txt | cut -d' ' -f1)
          UPSTREAM_APP_HASH=$(sha256sum /tmp/upstream/src/api/app.py | cut -d' ' -f1)

          echo "auth_hash=$UPSTREAM_AUTH_HASH" >> $GITHUB_OUTPUT
          echo "req_hash=$UPSTREAM_REQ_HASH" >> $GITHUB_OUTPUT
          echo "app_hash=$UPSTREAM_APP_HASH" >> $GITHUB_OUTPUT

          cd /tmp/upstream/src
          PATCH_FAILED=0
          for patch in app.py.patch auth.py.patch requirements.txt.patch; do
            if ! patch -p1 --dry-run < "$GITHUB_WORKSPACE/patches/$patch" > /dev/null 2>&1; then
              echo "::warning::Patch $patch may not apply cleanly to latest upstream"
              PATCH_FAILED=1
            fi
          done

          if [ "$PATCH_FAILED" = "1" ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on drift
        if: steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-drift',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Upstream drift detected: patches may need updating',
                body: `The weekly upstream check found that one or more patches may not apply cleanly to the latest \`aws-samples/bedrock-access-gateway\` source.\n\nPlease review and update the patches in \`patches/\` directory.\n\nUpstream hashes:\n- auth.py: \`${{ steps.drift.outputs.auth_hash }}\`\n- requirements.txt: \`${{ steps.drift.outputs.req_hash }}\`\n- app.py: \`${{ steps.drift.outputs.app_hash }}\``,
                labels: ['upstream-drift', 'automated']
              });
            }
